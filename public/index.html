<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Demo Chatbot</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #1e293b, #0f172a);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* container */
.chat-container {
  width: 420px;
  height: 600px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
  border-radius: 15px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* header */
.header {
    background-color: #1a73e8;
    background: linear-gradient(90deg, #4285F4, #9b51e0); 
    color: white;              
    padding: 15px 20px;       
    text-align: center;       
    font-size: 24px;          
    font-weight: bold;        
    border-radius: 8px;       
    box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* chat */
#chat {
  flex: 1;
  padding: 15px;
  overflow-y: auto;
  scroll-behavior: smooth;
}

/* message */
.message {
  display: flex;
  margin-bottom: 10px;
  animation: fadeIn 0.3s ease;
}

.user { justify-content: flex-end; }
.bot { justify-content: flex-start; }

.bubble {
  padding: 10px 15px;
  border-radius: 15px;
  max-width: 70%;
}

.user .bubble {
  background: #3b82f6;
  color: white;
}

.bot .bubble {
  background: #10b981;
  color: white;
}

/* typing dots */
.typing {
  display: flex;
  gap: 5px;
}

.dot {
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  animation: blink 1.4s infinite;
}

.dot:nth-child(2) { animation-delay: 0.2s; }
.dot:nth-child(3) { animation-delay: 0.4s; }

/* input */
.input-area {
  display: flex;
  padding: 10px;
  background: rgba(0,0,0,0.3);
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
}

button {
  margin-left: 10px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #2563eb;
}

/* animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes blink {
  0%,80%,100% { opacity: 0; }
  40% { opacity: 1; }
}
</style>
</head>

<body>

<div class="chat-container">
  <div class="header">🤖 DEMO AI Chatbot</div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="msg" placeholder="Nhập tin nhắn...">
    <button onclick="send()">Gửi</button>
  </div>
</div>

<script>
function addMessage(text, type){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";
  bubble.innerText = text;

  div.appendChild(bubble);
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

// typing animation
function typeText(element, text){
  let i = 0;
  const interval = setInterval(() => {
    element.innerText += text[i];
    i++;
    if(i >= text.length) clearInterval(interval);
  }, 15);
}

// loading dots
function showTyping(){
  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message bot typing-msg";

  const bubble = document.createElement("div");
  bubble.className = "bubble typing";

  for(let i=0;i<3;i++){
    const dot = document.createElement("div");
    dot.className = "dot";
    bubble.appendChild(dot);
  }

  div.appendChild(bubble);
  chat.appendChild(div);

  chat.scrollTop = chat.scrollHeight;
}

function removeTyping(){
  const typing = document.querySelector(".typing-msg");
  if (typing) typing.remove();
}

async function send(){
  const input = document.getElementById("msg");
  const msg = input.value;

  if (!msg) return;

  addMessage(msg, "user");
  input.value = "";

  showTyping();

  const res = await fetch("/chat", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({ message: msg })
  });

  const data = await res.json();

  removeTyping();

  const chat = document.getElementById("chat");

  const div = document.createElement("div");
  div.className = "message bot";

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  div.appendChild(bubble);
  chat.appendChild(div);

  typeText(bubble, data.reply);
}
</script>

</body>
</html>
